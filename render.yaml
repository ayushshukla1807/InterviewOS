services:
  # Single Full-Stack Next.js Service (Frontend + Backend API Routes + MongoDB Auth)
  # Deployed at: https://interviewos-ytph.onrender.com
  # All secret env vars are set via Render Dashboard (not in this file for security)
  - type: web
    name: interviewos-ytph
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_NAME
        value: InterviewOS
      # Secrets are set in Render Dashboard — not committed to git
      # Required: MONGODB_URI, JWT_SECRET, GEMINI_API_KEY, AZURE_SPEECH_KEY, AZURE_SPEECH_REGION
